# pcb2gcode config for the drill pass — converts the Excellon drill file to
# G-code. See README.md in this folder for the full laser+drill workflow.
#
# EDIT the three paths below to point at your KiCad plot output, then run
# from the folder holding the .drl (the pcb2gcode in current nixpkgs fails to
# build against boost 1.87, so pin the 24.05 channel which ships a working
# prebuilt binary):
#
#   nix run github:NixOS/nixpkgs/nixos-24.05#pcb2gcode -- --config drill.cfg
#
# Then post-process the result into the dry-run + real-drill pair:
#
#   python3 postprocess_drill.py <name>.drl.gcode --speed 255 --hover 0.2
#
# IMPORTANT: export the .drl from KiCad with the Drill/Place File Origin on a
# board fiducial (not the bare corner — the edge etches away) and "Use
# drill/place file origin" enabled. Drilling from the back mirrors X.
drill=output/board.drl
drill-output=board.drl.gcode
output-dir=output
# Laser workflow preamble: no pen->drill offset, just touch off + zero.
preamble=preamble_laser_drill.ngc
postamble=postamble.ngc

# Common options
metric=true
metricoutput=true
zchange=30.0000
zero-start=false
zsafe=5.0000
software=custom

# Drill options
drill-feed=200
drill-side=back
# Spindle is now driven by the G-code (M3 S...). 255 = full PWM duty on
# Marlin built in laser/spindle mode with CUTTER_POWER_UNIT=PWM255. The
# post-processor moves this value onto the M3 line, which Marlin requires to
# actually set the speed (a bare M3 only toggles the enable pin).
drill-speed=255
milldrill=false
nog81=true
onedrill=false
zdrill=-2.5000
