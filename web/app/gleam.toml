name = "blau_drill"
version = "1.0.0"
target = "javascript"

# The pure-web rewrite of blau_drill: a Lustre SPA (Gleam → JavaScript) that
# drives the PCB driller directly over the Web Serial API — no backend server.
# See ../../.scratch/gleam-pure-web-migration/PRD.md.

[dependencies]
gleam_stdlib = ">= 0.34.0 and < 2.0.0"
lustre = ">= 5.0.0 and < 6.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"
gleam_regexp = ">= 1.0.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = ">= 2.0.0 and < 3.0.0"

[tools.lustre.html]
title = "blau-drill · Precision PCB Drilling Control"

[[tools.lustre.html.stylesheets]]
href = "/styles.css"
